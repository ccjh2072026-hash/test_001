    const SESSIONS = [

      { name: "第二節", time: "9:10-9:55", group: "am", bg: "bg-blue-50/70", text: "text-blue-700", border: "border-blue-200", classId: "am", reservable: true },
      { name: "第三節", time: "10:05-10:50", group: "am", bg: "bg-blue-50/70", text: "text-blue-700", border: "border-blue-200", classId: "am", reservable: true },
      { name: "第四節", time: "11:00-11:45", group: "am", bg: "bg-blue-50/70", text: "text-blue-700", border: "border-blue-200", classId: "am", reservable: true },
      { name: "中午", time: "12:15-13:00", group: "noon", bg: "bg-amber-50/70", text: "text-amber-700", border: "border-amber-200", classId: "noon", reservable: true },
      { name: "第五節", time: "13:05-13:50", group: "pm", bg: "bg-rose-50/70", text: "text-rose-700", border: "border-rose-200", classId: "pm", reservable: true },

    const PURPOSES = ["領域教學", "研習", "校定課程", "社團", "行政業務", "其他"];
    const WEEKDAYS_ZH = ["一", "二", "三", "四", "五", "六"];
    const DEFAULT_DATE_STR = "2026-07-20";
    const SAMSUNG_CODES = Array.from({ length: 16 }).map((_, i) => `(S)-${String.fromCharCode(65 + i)}(1-30)`);
    const IPAD_CODES = Array.from({ length: 7 }).map((_, i) => `(I)-${String.fromCharCode(66 + i)}(1-30)`);
    const CHROMEBOOK_CODES = ["(CB)-A(1-30)", "(CB)-B(1-30)"];

    function getMonday(d) {
      const date = new Date(d);
      const day = date.getDay();
      const diff = date.getDate() - day + (day === 0 ? -6 : 1);
      return new Date(date.setDate(diff));
    }

    function formatDate(date) {
      if (!date) return "";
      if (typeof date === 'string') return date;
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function App() {
      const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxIMtAIFllzJBmJo6omk51RogyrGcY9NWfb7fQ-zliylPlN-X8Vajat3bUF36XGLGMX9w/exec";
      const [reservations, setReservations] = useState(() => {
        const saved = localStorage.getItem("ccjh_tablet_reservations_v6");
        return saved ? JSON.parse(saved) : INITIAL_RESERVATIONS;
      });
      const [systemTitle, setSystemTitle] = useState(() => {
        const saved = localStorage.getItem("ccjh_tablet_system_title_v6");
        return saved ? saved : "142-1151學年度暑期校內平板臨時借用預約";
      });
      const [systemSubtitle, setSystemSubtitle] = useState(() => {
        const saved = localStorage.getItem("ccjh_tablet_system_subtitle_v6");
        return saved ? saved : "🔔 暑期預約～請於 7/8 前預約。提醒老師務必協助於課堂使用時拍照紀錄，並將相關照片、成果、成效評估等資料上傳。";
      });
      const [semesterStart, setSemesterStart] = useState(() => {
        const saved = localStorage.getItem("ccjh_tablet_semester_start_v6");
        return saved ? saved : "2026-07-01";
      });
      const [semesterEnd, setSemesterEnd] = useState(() => {
        const saved = localStorage.getItem("ccjh_tablet_semester_end_v6");
        return saved ? saved : "2026-08-31";
      });
      const [isEditingTitle, setIsEditingTitle] = useState(false);
      const [isEditingSubtitle, setIsEditingSubtitle] = useState(false);
      const [isEditingSettings, setIsEditingSettings] = useState(false);
      const [tempTitle, setTempTitle] = useState(systemTitle);
      const [tempSubtitle, setTempSubtitle] = useState(systemSubtitle);
      const [tempSemesterStart, setTempSemesterStart] = useState(semesterStart);
      const [tempSemesterEnd, setTempSemesterEnd] = useState(semesterEnd);
      const [isAdmin, setIsAdmin] = useState(false);
      const [showLoginModal, setShowLoginModal] = useState(false);
      const [loginUser, setLoginUser] = useState("");
      const [loginPass, setLoginPass] = useState("");
      const [loginError, setLoginError] = useState("");
      const [activeTab, setActiveTab] = useState("book"); 
      const [selectedWeekStart, setSelectedWeekStart] = useState(() => getMonday(new Date(DEFAULT_DATE_STR)));
      const [searchTerm, setSearchTerm] = useState("");
      const [filterPurpose, setFilterPurpose] = useState("全部");
      const [formData, setFormData] = useState({
        email: "",
        teacher: "",
        purpose: "領域教學",
        date: DEFAULT_DATE_STR,
        grade: "",
        sessions: [],
        tabletCode: ""
      });
      const [notification, setNotification] = useState(null);
      const [tabletAssignModal, setTabletAssignModal] = useState(null); 
      const [tempTabletCode, setTempTabletCode] = useState("");
      const [deleteConfirmModal, setDeleteConfirmModal] = useState(null);
      const [showExportModal, setShowExportModal] = useState(false);
      const [exportRangeType, setExportRangeType] = useState("all");
      const [customExportStart, setCustomExportStart] = useState("2026-07-01");
      const [customExportEnd, setCustomExportEnd] = useState("2026-08-31");
      const [showWordExportModal, setShowWordExportModal] = useState(false);
      const [wordExportType, setWordExportType] = useState("week");
      const [wordCustomStart, setWordCustomStart] = useState("2026-07-20");
      const [wordCustomEnd, setWordCustomEnd] = useState("2026-07-25");

      useEffect(() => {
        localStorage.setItem("ccjh_tablet_reservations_v6", JSON.stringify(reservations));
      }, [reservations]);

      useEffect(() => {
        localStorage.setItem("ccjh_tablet_system_title_v6", systemTitle);
        document.title = systemTitle + " - 佳佳國中";
      }, [systemTitle]);

      useEffect(() => {
        localStorage.setItem("ccjh_tablet_system_subtitle_v6", systemSubtitle);
      }, [systemSubtitle]);

      useEffect(() => {
        localStorage.setItem("ccjh_tablet_semester_start_v6", semesterStart);
      }, [semesterStart]);

      useEffect(() => {
        localStorage.setItem("ccjh_tablet_semester_end_v6", semesterEnd);
      }, [semesterEnd]);

      const showNotification = (message, type = "success") => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 4000);
      };

      const currentWeekDays = useMemo(() => {
        return Array.from({ length: 6 }).map((_, i) => {
          const d = new Date(selectedWeekStart);
          d.setDate(selectedWeekStart.getDate() + i);
          return {
            dateStr: formatDate(d),
            dayZh: WEEKDAYS_ZH[i],
            monthDayStr: `${d.getMonth() + 1}/${d.getDate()}`,
            isToday: formatDate(d) === formatDate(new Date())
          };
        });
      }, [selectedWeekStart]);

      const changeWeek = (weeksOffset) => {
        const newDate = new Date(selectedWeekStart);
        newDate.setDate(selectedWeekStart.getDate() + weeksOffset * 7);
        setSelectedWeekStart(newDate);
      };

      const goToTodayWeek = () => {
        setSelectedWeekStart(getMonday(new Date()));
      };

      const handleWeekJump = (e) => {
        if (e.target.value) {
          setSelectedWeekStart(getMonday(new Date(e.target.value)));
        }
      };

      const handleCheckboxChange = (sessionName) => {
        setFormData(prev => {
          const alreadySelected = prev.sessions.includes(sessionName);
          const newSessions = alreadySelected
            ? prev.sessions.filter(s => s !== sessionName)
            : [...prev.sessions, sessionName];
          return { ...prev, sessions: newSessions };
        });
      };

      const duplicateWarning = useMemo(() => {
        if (!formData.date || formData.sessions.length === 0) return null;
        
        const conflicting = reservations.filter(res => {
          if (res.date !== formData.date) return false;
          return res.sessions.some(s => formData.sessions.includes(s));
        });
        if (conflicting.length > 0) {
          return {
            message: `⚠️ 注意！${formData.date} 當天，已由以下老師預約同節次：`,
            conflicts: conflicting.map(c => `${c.teacher} (${c.grade} / ${c.sessions.join(", ")})`)
          };
        }
        return null;
      }, [formData.date, formData.sessions, reservations]);

      const handleQuickBook = (dateStr, sessionName) => {
        if (new Date(dateStr) < new Date(semesterStart) || new Date(dateStr) > new Date(semesterEnd)) {
          showNotification(`該日期不在目前設定的學期預約範圍內 (${semesterStart} ~ ${semesterEnd})！`, "error");
          return;
        }
        setFormData(prev => ({
          ...prev,
          date: dateStr,
          sessions: [sessionName]
        }));
        setActiveTab("book");
        showNotification(`已預填借用日期：${dateStr} 與 使用節次：${sessionName}！`, "info");
      };

      // 修正 1：加上 async 關鍵字，並清理後續重複出現的多餘邏輯
      const handleSubmit = async (e) => {
        e.preventDefault();
        
        if (!formData.email.trim()) return showNotification("請填寫電子郵件", "error");
        if (!formData.teacher.trim()) return showNotification("請填寫借用教師姓名", "error");
        if (!formData.grade.trim()) return showNotification("請填寫使用年級與班級", "error");
        if (formData.sessions.length === 0) return showNotification("請至少選擇一個使用節次", "error");
        if (new Date(formData.date) < new Date(semesterStart) || new Date(formData.date) > new Date(semesterEnd)) {
          return showNotification(`借用日期超出該學期可借用區間！目前範圍：${semesterStart} 至 ${semesterEnd}`, "error");
        }
        if (formData.sessions.includes("早自習")) {
          return showNotification("「早自習」時段不開放預約借用！", "error");
        }
        const newReservation = {
          id: 'res_' + Date.now(),
          ...formData
        };

        showNotification("資料傳送中，請稍候...", "info");
        try {
          await fetch(GAS_API_URL, {
            method: "POST",
            mode: "no-cors",
            headers: {
              "Content-Type": "text/plain;charset=utf-8"
            },
            body: JSON.stringify(newReservation)
          });

          setReservations(prev => [newReservation, ...prev]);
          showNotification("預約借用成功！已將您的預約登錄至 Google 試算表與系統。");
          setFormData(prev => ({
            ...prev,
            sessions: []
          }));
          setActiveTab("list");
        } catch (error) {
          console.error("回存 GAS 失敗:", error);
          showNotification("連線 Google 服務失敗，請檢查網路或稍後再試！", "error");
        }
      };

      const handleAdminToggle = () => {
        if (isAdmin) {
          setIsAdmin(false);
          showNotification("已登出管理員模式。", "info");
        } else {
          setLoginError("");
          setShowLoginModal(true);
        }
      };

      const handleLoginSubmit = (e) => {
        e.preventDefault();
        if (loginUser.trim() === "admin" && loginPass === "admin123") {
          setIsAdmin(true);
          setShowLoginModal(false);
          setLoginUser("");
          setLoginPass("");
          showNotification("管理員登入成功！已啟用設備指派與系統設定權限。", "success");
        } else {
          setLoginError("帳號或密碼錯誤！請重新確認。");
        }
      };

      const saveSystemSettings = (e) => {
        e.preventDefault();
        setSemesterStart(tempSemesterStart);
        setSemesterEnd(tempSemesterEnd);
        setIsEditingSettings(false);
        showNotification("學期預約時間區間設定成功！", "success");
      };

      const requestDelete = (res) => {
        if (!isAdmin) {
          showNotification("取消預約功能限管理員使用，請先登入管理員帳號！", "error");
          setShowLoginModal(true);
          return;
        }
        setDeleteConfirmModal(res);
      };

      const confirmDelete = () => {
        if (deleteConfirmModal) {
          setReservations(prev => prev.filter(r => r.id !== deleteConfirmModal.id));
          showNotification(`已成功取消 ${deleteConfirmModal.teacher} 老師的預約。`);
          setDeleteConfirmModal(null);
        }
      };

      const openTabletAssign = (res) => {
        if (!isAdmin) {
          showNotification("指派平板功能限管理員使用，請先登入！", "error");
          setShowLoginModal(true);
          return;
        }
        setTabletAssignModal(res);
        setTempTabletCode(res.tabletCode || "");
      };

      const saveTabletAssign = () => {
        if (tabletAssignModal) {
          setReservations(prev => prev.map(r => {
            if (r.id === tabletAssignModal.id) {
              return { ...r, tabletCode: tempTabletCode };
            }
            return r;
          }));
          showNotification(`成功指派平板編號為: ${tempTabletCode || '未指派'}`);
          setTabletAssignModal(null);
        }
      };

      const filteredReservations = useMemo(() => {
        return reservations.filter(res => {
          const matchSearch = 
            res.teacher.toLowerCase().includes(searchTerm.toLowerCase()) ||
            res.grade.toLowerCase().includes(searchTerm.toLowerCase()) ||
            res.purpose.toLowerCase().includes(searchTerm.toLowerCase()) ||
            (res.tabletCode && res.tabletCode.toLowerCase().includes(searchTerm.toLowerCase())) ||
            res.date.includes(searchTerm);
          
          const matchPurpose = filterPurpose === "全部" || res.purpose === filterPurpose;
          return matchSearch && matchPurpose;
        });
      }, [reservations, searchTerm, filterPurpose]);

      const handleCsvExport = () => {
        if (!isAdmin) {
          showNotification("匯出資料屬於管理員專屬功能，請先登入！", "error");
          setShowLoginModal(true);
          return;
        }
        setExportRangeType("all");
        setCustomExportStart(semesterStart);
        setCustomExportEnd(semesterEnd);
        setShowExportModal(true);
      };

      const executeCsvExport = () => {
        let exportData = filteredReservations;
        
        if (exportRangeType === "custom") {
          const start = new Date(customExportStart);
          const end = new Date(customExportEnd);
          exportData = filteredReservations.filter(r => {
            const d = new Date(r.date);
            return d >= start && d <= end;
          });
        }
        if (exportData.length === 0) {
          showNotification("所選區間內無任何預約資料！", "error");
          return;
        }
        let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
        csvContent += "用途,借用日期,使用節次,使用年級班級,指派平板編號,借用人郵件,借用人姓名\r\n";
        
        exportData.forEach(r => {
          const row = [
            r.purpose,
            r.date,
            `"${r.sessions.join(', ')}"`,
            `"${r.grade}"`,
            `"${r.tabletCode || ''}"`,
            r.email,
            r.teacher
          ].join(",");
          csvContent += row + "\r\n";
        });
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `CCJH_Tablets_Filtered_${formatDate(new Date())}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setShowExportModal(false);
        showNotification(`成功匯出 ${exportData.length} 筆資料為 CSV 檔！`);
      };

      const handleWordExportClick = () => {
        if (!isAdmin) {
          showNotification("課表匯出屬於管理員專屬功能，請先登入！", "error");
          setShowLoginModal(true);
          return;
        }
        setWordExportType("week");
        setWordCustomStart(formatDate(selectedWeekStart));
        
        const sat = new Date(selectedWeekStart);
        sat.setDate(selectedWeekStart.getDate() + 5);
        setWordCustomEnd(formatDate(sat));
        setShowWordExportModal(true);
      };

      const executeWordExport = () => {
        let weeksToExport = [];
        if (wordExportType === "week") {
          weeksToExport.push({
            start: new Date(selectedWeekStart),
            end: new Date(selectedWeekStart.getTime() + 5 * 24 * 60 * 60 * 1000)
          });
        } else {
          let current = getMonday(new Date(wordCustomStart));
          const limit = new Date(wordCustomEnd);
          while (current <= limit) {
            const endOfWeek = new Date(current);
            endOfWeek.setDate(current.getDate() + 5);
            weeksToExport.push({
              start: new Date(current),
              end: endOfWeek
            });
            current.setDate(current.getDate() + 7);
          }
        }
        if (weeksToExport.length === 0) {
          showNotification("無有效的匯出時間範圍設定！", "error");
          return;
        }
        let docHtml = `
          <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
          <head>
            <meta charset='utf-8'>
            <title>佳佳國中平板臨時借用預約狀況</title>
            <style>
              body { font-family: Arial, "Microsoft JhengHei", sans-serif; padding: 20px; color: #333; }
              .header { text-align: center; margin-bottom: 30px; }
              .header h1 { font-size: 18pt; font-weight: bold; margin-bottom: 5px; color: #1e3a8a; }
              .header p { font-size: 10pt; color: #666; margin: 0; }
              .table-container { margin-bottom: 40px; page-break-after: always; }
              .table-title { font-size: 12pt; font-weight: bold; margin-bottom: 10px; color: #2563eb; }
              table { width: 100%; border-collapse: collapse; border: 1.5px solid #475569; margin-bottom: 20px; }
              th, td { border: 1px solid #94a3b8; padding: 6px; font-size: 9.5pt; text-align: center; vertical-align: middle; }
              th { background-color: #f1f5f9; font-weight: bold; color: #1e293b; height: 35px; }
              .sidebar-header { background-color: #f8fafc; font-weight: bold; width: 110px; }
              .morning-bg { background-color: #f3e8ff; }
              .am-bg { background-color: #dbeafe; }
              .noon-bg { background-color: #fef3c7; }
              .pm-bg { background-color: #ffe4e6; }
              .evening-bg { background-color: #d1fae5; }
              .card { border: 1px solid #cbd5e1; background-color: #ffffff; padding: 4px; border-radius: 4px; font-size: 8.5pt; text-align: left; margin: 2px 0; }
              .card-title { font-weight: bold; color: #0f172a; border-bottom: 1px solid #e2e8f0; padding-bottom: 2px; margin-bottom: 2px; }
              .card-detail { color: #475569; }
              .lock-text { color: #94a3b8; font-style: italic; font-size: 8.5pt; }
            </style>
          </head>
          <body>
            <div class='header'>
              <h1>佳佳國中 平板借用課表統計表</h1>
              <p>系統自動導出檔 - 匯出日期: ${formatDate(new Date())}</p>
            </div>
        `;
        weeksToExport.forEach((weekRange, index) => {
          const daysOfWeek = Array.from({ length: 6 }).map((_, i) => {
            const d = new Date(weekRange.start);
            d.setDate(weekRange.start.getDate() + i);
            return {
              dateStr: formatDate(d),
              dayZh: WEEKDAYS_ZH[i],
              monthDayStr: `${d.getMonth() + 1}/${d.getDate()}`
            };
          });
          const titleStr = `週預約排程課表: ${formatDate(weekRange.start)} (一) 至 ${formatDate(daysOfWeek[5].dateStr)} (六)`;
          docHtml += `
            <div class='table-container' ${index === weeksToExport.length - 1 ? "style='page-break-after: avoid;'" : ""}>
              <div class='table-title'>${titleStr}</div>
              <table>
                <thead>
                  <tr>
                    <th>節次 / 時間</th>
                    ${daysOfWeek.map(day => `<th>週${day.dayZh}<br/><span style='font-size: 8pt; font-weight:normal;'>${day.monthDayStr}</span></th>`).join('')}
                  </tr>
                </thead>
                <tbody>
          `;
          SESSIONS.forEach(session => {
            let sessionBgClass = "";
            if (session.group === "morning") sessionBgClass = "morning-bg";
            if (session.group === "am") sessionBgClass = "am-bg";
            if (session.group === "noon") sessionBgClass = "noon-bg";
            if (session.group === "pm") sessionBgClass = "pm-bg";
            if (session.group === "evening") sessionBgClass = "evening-bg";
            docHtml += `<tr>`;
            docHtml += `<td class='sidebar-header ${sessionBgClass}'>${session.name}<br/><span style='font-size:7.5pt; font-weight:normal; color:#475569;'>${session.time}</span></td>`;
            daysOfWeek.forEach(day => {
              const cellReservations = reservations.filter(res => 
                res.date === day.dateStr && res.sessions.includes(session.name)
              );
              docHtml += `<td>`;
              if (cellReservations.length > 0) {
                cellReservations.forEach(res => {
                  docHtml += `
                    <div class='card'>
                      <div class='card-title'>🏫 班級: ${res.grade}</div>
                      <div class='card-detail'>
                        <b>👤 老師:</b> ${res.teacher}<br/>
                        <b>🏷️ 平板編號:</b> ${res.tabletCode || '⚠️ 未指派'}
                      </div>
                    </div>
                  `;
                });
              } else if (!session.reservable) {
                docHtml += `<span class='lock-text'>🔒 不開放</span>`;
              } else {
                docHtml += `<span style='color: #cbd5e1; font-size: 8pt;'>-</span>`;
              }
              docHtml += `</td>`;
            });
            docHtml += `</tr>`;
          });
          docHtml += `
                </tbody>
              </table>
            </div>
          `;
        });
        docHtml += `
          </body>
          </html>
        `;
        const blob = new Blob(['\ufeff' + docHtml], { type: 'application/msword;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `CCJH_Tablet_Weekly_Schedule_${formatDate(new Date())}.doc`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        
        setShowWordExportModal(false);
        showNotification("平板課表 Word 文件 (.doc) 產生並下載成功！可在 Microsoft Word 或 Google Docs 完美相容開啟。");
      };

      const stats = useMemo(() => {
        const total = reservations.length;
        const unassigned = reservations.filter(r => !r.tabletCode || r.tabletCode.trim() === "").length;
        const upcoming = reservations.filter(r => new Date(r.date) >= new Date(DEFAULT_DATE_STR)).length;
        
        const teacherCounts = {};
        reservations.forEach(r => {
          teacherCounts[r.teacher] = (teacherCounts[r.teacher] || 0) + 1;
        });
        const activeTeacher = Object.entries(teacherCounts).sort((a, b) => b[1] - a[1])[0]?.[0] || "無";
        return { total, unassigned, upcoming, activeTeacher };
      }, [reservations]);

      // 修正 2：補上依賴陣列 [] 避免重複被呼叫執行
      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }, []);

      return (
        <div className="min-h-screen flex flex-col">
          <header className="bg-gradient-to-r from-purple-700 via-indigo-800 to-blue-800 text-white shadow-md">
            <div className="max-w-7xl mx-auto px-4 py-6 md:py-8">
              <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div className="flex-1">
                  <div className="inline-flex items-center gap-2 bg-white/20 text-white text-xs font-semibold px-3 py-1 rounded-full backdrop-blur-sm mb-2">
                    <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                    國中校內資訊設備管理平台
                  </div>
                  
                  {isEditingTitle ? (
                    <div className="flex items-center gap-2 mt-1">
                      <input
                        type="text"
                        value={tempTitle}
                        onChange={(e) => setTempTitle(e.target.value)}
                        className="bg-white text-slate-800 text-xl md:text-2xl font-bold px-3 py-1.5 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 w-full md:w-[450px]"
                      />
                      <button
                        onClick={() => {
                          if (tempTitle.trim()) {
                            setSystemTitle(tempTitle.trim());
                            setIsEditingTitle(false);
                            showNotification("系統標題修改成功！", "success");
                          } else {
                            showNotification("標題不可為空", "error");
                          }
                        }}
                        className="p-2 rounded-lg bg-emerald-500 hover:bg-emerald-600 text-white transition flex-shrink-0 inline-flex items-center justify-center"
                        title="確認儲存"
                      >
                        <i data-lucide="check" className="w-4 h-4"></i>
                      </button>
                      <button
                        onClick={() => {
                          setTempTitle(systemTitle);
                          setIsEditingTitle(false);
                        }}
                        className="p-2 rounded-lg bg-red-500 hover:bg-red-600 text-white transition flex-shrink-0 inline-flex items-center justify-center"
                        title="取消"
                      >
                        <i data-lucide="x" className="w-4 h-4"></i>
                      </button>
                    </div>
                  ) : (
                    <h1 className="text-2xl md:text-3xl font-bold tracking-tight flex items-center gap-2">
                      {systemTitle}
                      {isAdmin && (
                        <button
                          onClick={() => {
                            setTempTitle(systemTitle);
                            setIsEditingTitle(true);
                          }}
                          className="p-1 rounded bg-white/20 hover:bg-white/30 transition text-white inline-flex items-center justify-center"
                          title="修改系統標題"
                        >
                          <i data-lucide="edit-3" className="w-4 h-4"></i>
                        </button>
                      )}
                    </h1>
                  )}
                  
                  {isEditingSubtitle ? (
                    <div className="flex gap-2 mt-2 w-full max-w-2xl">
                      <textarea
                        value={tempSubtitle}
                        onChange={(e) => setTempSubtitle(e.target.value)}
                        className="bg-white text-slate-800 text-xs md:text-sm px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 w-full h-20 resize-none"
                      />
                      <div className="flex flex-col gap-2 flex-shrink-0">
                        <button
                          onClick={() => {
                            setSystemSubtitle(tempSubtitle.trim());
                            setIsEditingSubtitle(false);
                            showNotification("系統說明修改成功！", "success");
                          }}
                          className="p-2 rounded-lg bg-emerald-500 hover:bg-emerald-600 text-white transition inline-flex items-center justify-center"
                          title="確認儲存"
                        >
                          <i data-lucide="check" className="w-4 h-4"></i>
                        </button>
                        <button
                          onClick={() => {
                            setTempSubtitle(systemSubtitle);
                            setIsEditingSubtitle(false);
                          }}
                          className="p-2 rounded-lg bg-red-500 hover:bg-red-600 text-white transition inline-flex items-center justify-center"
                          title="取消"
                        >
                          <i data-lucide="x" className="w-4 h-4"></i>
                        </button>
                      </div>
                    </div>
                  ) : (
                    <div className="text-purple-100 text-xs md:text-sm mt-1 max-w-3xl flex items-start gap-2 group">
                      <p className="flex-1 leading-relaxed">{systemSubtitle}</p>
                      {isAdmin && (
                        <button
                          onClick={() => {
                            setTempSubtitle(systemSubtitle);
                            setIsEditingSubtitle(true);
                          }}
                          className="p-1 rounded bg-white/20 hover:bg-white/30 transition text-white inline-flex items-center justify-center opacity-75 group-hover:opacity-100 flex-shrink-0"
                          title="修改系統說明與注意事項"
                        >
                          <i data-lucide="edit-2" className="w-3.5 h-3.5"></i>
                        </button>
                      )}
                    </div>
                  )}
                </div>
                
                {/* Admin Toggle */}
                <div className="flex flex-col md:flex-row items-stretch md:items-center gap-3">
                  <div className="flex items-center gap-3 bg-white/10 p-2.5 rounded-xl border border-white/20 backdrop-blur-md">
                    <div className="flex items-center gap-2">
                      <span className={`p-1.5 rounded-md ${isAdmin ? 'bg-emerald-500 text-white animate-pulse' : 'bg-white/15 text-white/70'}`}>
                        <i data-lucide={isAdmin ? "shield-check" : "lock-keyhole"} className="w-4 h-4"></i>
                      </span>
                      <div className="text-left pr-2">
                        <p className="text-[11px] font-bold text-white/90 leading-tight">管理權限模式</p>
                        <p className="text-[10px] text-white/60 leading-none">{isAdmin ? "管理權限已啟用" : "需登入以編輯平板"}</p>
                      </div>
                    </div>
                    <button 
                      onClick={handleAdminToggle}
                      className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all duration-200 ${
                        isAdmin 
                          ? "bg-amber-400 text-slate-950 shadow-md shadow-amber-500/20 hover:bg-amber-300"
                          : "bg-white/20 text-white hover:bg-white/30"
                      }`}
                    >
                      {isAdmin ? "登出管理" : "管理者登入"}
                    </button>
                  </div>
                  {isAdmin && (
                    <button
                      onClick={() => {
                        setTempSemesterStart(semesterStart);
                        setTempSemesterEnd(semesterEnd);
                        setIsEditingSettings(true);
                      }}
                      className="bg-indigo-600 hover:bg-indigo-700 text-white border border-indigo-500 p-3 rounded-xl flex items-center justify-center gap-2 text-xs font-bold transition-all"
                      title="系統預約區間設定"
                    >
                      <i data-lucide="settings" className="w-4 h-4 animate-spin-slow"></i>
                      <span>系統設定</span>
                    </button>
                  )}
                </div>
              </div>
            </div>
          </header>

          {/* Toast Notification */}
          {notification && (
            <div className={`fixed top-4 right-4 z-50 flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl transition-all duration-300 transform translate-y-0 ${
              notification.type === "error" ? "bg-red-50 text-red-800 border-l-4 border-red-500" :
              notification.type === "info" ? "bg-blue-50 text-blue-800 border-l-4 border-blue-500" :
              "bg-emerald-50 text-emerald-800 border-l-4 border-emerald-500"
            }`}>
              <i data-lucide={notification.type === "error" ? "alert-circle" : "check-circle-2"} className="w-5 h-5 flex-shrink-0"></i>
              <span className="text-sm font-medium">{notification.message}</span>
            </div>
          )}

          {/* Statistics Dashboard */}
          <main className="flex-1 max-w-7xl w-full mx-auto p-4 md:py-6">
            <div className="grid grid-cols-1 sm:grid-cols-4 gap-4 mb-6">
              <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                <div className="p-3 rounded-lg bg-indigo-50 text-indigo-600">
                  <i data-lucide="tablet" className="w-6 h-6"></i>
                </div>
                <div>
                  <p className="text-xs text-slate-500">總平板預約借用次數</p>
                  <p className="text-xl font-bold text-slate-800">{stats.total} 筆紀錄</p>
                </div>
              </div>
              <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                <div className="p-3 rounded-lg bg-red-50 text-red-600">
                  <i data-lucide="alert-octagon" className="w-6 h-6"></i>
                </div>
                <div>
                  <p className="text-xs text-slate-500">未指派平板編號</p>
                  <p className="text-xl font-bold text-red-600">{stats.unassigned} 筆待指派</p>
                </div>
              </div>
              <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                <div className="p-3 rounded-lg bg-emerald-50 text-emerald-600">
                  <i data-lucide="calendar" className="w-6 h-6"></i>
                </div>
                <div>
                  <p className="text-xs text-slate-500">學期預約可借區間</p>
                  <p className="text-[11px] font-bold text-emerald-800 leading-tight">
                    {semesterStart.replace(/-/g, "/")} ~ <br/>
                    {semesterEnd.replace(/-/g, "/")}
                  </p>
                </div>
              </div>
              <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                <div className="p-3 rounded-lg bg-purple-50 text-purple-600">
                  <i data-lucide="award" className="w-6 h-6"></i>
                </div>
                <div>
                  <p className="text-xs text-slate-500">最熱門平板借用教師</p>
                  <p className="text-xl font-bold text-slate-800">{stats.activeTeacher} 老師</p>
                </div>
              </div>
            </div>

            <div className="flex border-b border-slate-200 mb-6 bg-white p-1 rounded-xl shadow-sm gap-1">
              <button
                onClick={() => setActiveTab("book")}
                className={`flex-1 md:flex-initial flex items-center justify-center gap-2 px-6 py-3 rounded-lg text-sm font-semibold transition-all duration-150 ${
                  activeTab === "book"
                    ? "bg-indigo-600 text-white shadow-sm"
                    : "text-slate-600 hover:bg-slate-100 hover:text-slate-900"
                }`}
              >
                <i data-lucide="file-plus-2" className="w-4 h-4"></i>
                填寫預約表單
              </button>
              
              <button
                onClick={() => setActiveTab("list")}
                className={`flex-1 md:flex-initial flex items-center justify-center gap-2 px-6 py-3 rounded-lg text-sm font-semibold transition-all duration-150 ${
                  activeTab === "list"
                    ? "bg-indigo-600 text-white shadow-sm"
                    : "text-slate-600 hover:bg-slate-100 hover:text-slate-900"
                }`}
              >
                <i data-lucide="list-collapse" className="w-4 h-4"></i>
                預約明細紀錄表
                {stats.unassigned > 0 && (
                  <span className="bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded-full ml-1 font-bold">
                    {stats.unassigned}
                  </span>
                )}
              </button>
              <button
                onClick={() => setActiveTab("timetable")}
                className={`flex-1 md:flex-initial flex items-center justify-center gap-2 px-6 py-3 rounded-lg text-sm font-semibold transition-all duration-150 ${
                  activeTab === "timetable"
                    ? "bg-indigo-600 text-white shadow-sm"
                    : "text-slate-600 hover:bg-slate-100 hover:text-slate-900"
                }`}
              >
                <i data-lucide="calendar-range" className="w-4 h-4"></i>
                一週預約狀況課表
              </button>
            </div>

            {/* TAB 1: BOOK FORM */}
            {activeTab === "book" && (
              <div className="max-w-3xl mx-auto bg-white rounded-2xl border border-slate-200 shadow-lg overflow-hidden transition-all duration-200 animate-fadeIn">
                <div className="h-2 bg-gradient-to-r from-purple-500 via-indigo-500 to-blue-500"></div>
                <div className="p-6 md:p-8 border-b border-slate-100 bg-slate-50/50">
                  <h2 className="text-xl md:text-2xl font-extrabold text-slate-800 flex items-center gap-2">
                    <i data-lucide="calendar-plus" className="text-indigo-600"></i>
                    校內平板臨時借用預約單
                  </h2>
                  <p className="text-slate-500 text-xs mt-1.5">
                    請填寫基本預約資訊。目前可預約之學期日期限制為：<strong className="text-indigo-600">{semesterStart}</strong> 至 <strong className="text-indigo-600">{semesterEnd}</strong>。
                  </p>
                </div>
                <form onSubmit={handleSubmit} className="p-6 md:p-8 space-y-6">
                  {/* Email */}
                  <div className="space-y-1.5">
                    <label className="block text-sm font-bold text-slate-700">
                      電子郵件 <span className="text-red-500">*</span>
                    </label>
                    <input
                      type="email"
                      required
                      placeholder="您的教育公務信箱 (例如: username@ccjh.ntpc.edu.tw)"
                      value={formData.email}
                      onChange={(e) => setFormData(prev => ({ ...prev, email: e.target.value }))}
                      className="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition duration-150 text-sm"
                    />
                  </div>
                  {/* Teacher Name */}
                  <div className="space-y-1.5">
                    <label className="block text-sm font-bold text-slate-700">
                      借用教師姓名 <span className="text-red-500">*</span>
                    </label>
                    <input
                      type="text"
                      required
                      placeholder="請輸入借用人姓名 (例如: 何呂升)"
                      value={formData.teacher}
                      onChange={(e) => setFormData(prev => ({ ...prev, teacher: e.target.value }))}
                      className="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition duration-150 text-sm"
                    />
                  </div>
                  {/* Purpose */}
                  <div className="space-y-1.5">
                    <label className="block text-sm font-bold text-slate-700">
                      用途 <span className="text-red-500">*</span>
                    </label>
                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                      {PURPOSES.map((p, idx) => (
                        <label 
                          key={idx}
                          className={`flex items-center gap-2.5 p-3 rounded-xl border cursor-pointer transition ${
                            formData.purpose === p 
                              ? "border-indigo-500 bg-indigo-50/50 text-indigo-900 font-semibold" 
                              : "border-slate-200 hover:bg-slate-50 text-slate-600"
                          }`}
                        >
                          <input
                            type="radio"
                            name="purpose"
                            value={p}
                            checked={formData.purpose === p}
                            onChange={(e) => setFormData(prev => ({ ...prev, purpose: e.target.value }))}
                            className="text-indigo-600 focus:ring-indigo-500 h-4 w-4"
                          />
                          <span className="text-sm">{p}</span>
                        </label>
                      ))}
                    </div>
                  </div>
                  {/* Date */}
                  <div className="space-y-1.5">
                    <label className="block text-sm font-bold text-slate-700">
                      借用日期 <span className="text-red-500">*</span>
                    </label>
                    <input
                      type="date"
                      required
                      min={semesterStart}
                      max={semesterEnd}
                      value={formData.date}
                      onChange={(e) => setFormData(prev => ({ ...prev, date: e.target.value }))}
                      className="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition duration-150 text-sm font-mono font-semibold text-slate-800"
                    />
                    <p className="text-[11px] text-indigo-500">
                      * 僅開放：{semesterStart} 至 {semesterEnd} 之間的工作日。
                    </p>
                  </div>
                  {/* Grade/Class Target */}
                  <div className="space-y-1.5">
                    <label className="block text-sm font-bold text-slate-700">
                      使用年級或班級 (活動或研習請填其他) <span className="text-red-500">*</span>
                    </label>
                    <input
                      type="text"
                      required
                      placeholder="EX: 701、801 或 806教室"
                      value={formData.grade}
                      onChange={(e) => setFormData(prev => ({ ...prev, grade: e.target.value }))}
                      className="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition duration-150 text-sm"
                    />
                  </div>
                  {/* Sessions */}
                  <div className="space-y-1.5">
                    <label className="block text-sm font-bold text-slate-700">
                      使用節次 (可複選) <span className="text-red-500">*</span>
                    </label>
                    
                    <div className="grid grid-cols-2 sm:grid-cols-5 gap-2.5">
                      {SESSIONS.map((session, idx) => {
                        const isSelected = formData.sessions.includes(session.name);
                        return (
                          <label
                            key={idx}
                            className={`flex flex-col p-2.5 rounded-xl border text-center relative ${
                              !session.reservable
                                ? "bg-slate-100 border-slate-200 text-slate-400 cursor-not-allowed"
                                : isSelected 
                                  ? "border-indigo-600 bg-indigo-50/70 text-indigo-900 font-semibold shadow-sm cursor-pointer" 
                                  : "border-slate-200 hover:bg-slate-50 text-slate-600 cursor-pointer"
                            }`}
                          >
                            <input
                              type="checkbox"
                              checked={isSelected}
                              disabled={!session.reservable}
                              onChange={() => handleCheckboxChange(session.name)}
                              className="sr-only"
                            />
                            <span className="text-xs font-bold flex items-center justify-center gap-1">
                              {!session.reservable && <i data-lucide="lock" className="w-3 h-3"></i>}
                              {session.name}
                            </span>
                            <span className="text-[10px] text-slate-400 mt-0.5">
                              {session.reservable ? session.time : "不開放預約"}
                            </span>
                          </label>
                        );
                      })}
                    </div>
                  </div>
                  {isAdmin && (
                    <div className="space-y-1.5 p-4 bg-amber-50 rounded-xl border border-amber-200">
                      <label className="block text-sm font-bold text-amber-950 flex items-center gap-1.5">
                        <i data-lucide="settings" className="w-4 h-4 text-amber-700"></i>
                        管理員專用：指派預約平板組別代碼 (可選)
                      </label>
                      <input
                        type="text"
                        placeholder="EX: (S)-I(1-30)"
                        value={formData.tabletCode}
                        onChange={(e) => setFormData(prev => ({ ...prev, tabletCode: e.target.value }))}
                        className="w-full px-4 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500 bg-white text-sm"
                      />
                    </div>
                  )}
                  {duplicateWarning && (
                    <div className="p-4 bg-amber-50 border border-amber-200 rounded-xl space-y-2">
                      <p className="text-sm font-bold text-amber-800 flex items-center gap-1.5">
                        <i data-lucide="alert-triangle" className="w-5 h-5 flex-shrink-0 text-amber-600"></i>
                        {duplicateWarning.message}
                      </p>
                      <ul className="list-disc pl-6 text-xs text-amber-700 font-medium space-y-1">
                        {duplicateWarning.conflicts.map((conflict, i) => (
                          <li key={i}>{conflict}</li>
                        ))}
                      </ul>
                      <p className="text-[10px] text-amber-600 italic mt-1">
                        * 雖然系統不限制重複登載，但建議您與上述教師協調借用事宜以避免平板設備分配衝突。
                      </p>
                    </div>
                  )}
                  <div className="pt-4 flex items-center justify-end gap-3 border-t border-slate-100">
                    <button
                      type="button"
                      onClick={() => {
                        setActiveTab("timetable");
                        showNotification("已切換至週課表查看檢視。", "info");
                      }}
                      className="px-5 py-2.5 rounded-xl border border-slate-200 text-slate-600 hover:bg-slate-50 text-sm font-semibold transition"
                    >
                      查看週課表
                    </button>
                    <button
                      type="submit"
                      className="px-6 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold shadow-md hover:shadow-lg transition flex items-center gap-2"
                    >
                      <i data-lucide="check" className="w-4 h-4"></i>
                      確認送出預約
                    </button>
                  </div>
                </form>
              </div>
            )}

            {/* TAB 2: DETAILED LIST */}
            {activeTab === "list" && (
              <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden animate-fadeIn">
                <div className="p-4 md:p-6 bg-slate-50 border-b border-slate-200 flex flex-col md:flex-row md:items-center justify-between gap-4">
                  <div>
                    <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                      <span className="w-2.5 h-2.5 rounded-full bg-indigo-500"></span>
                      平板預約明細紀錄與篩選
                    </h2>
                    <p className="text-slate-500 text-xs mt-0.5">
                      您可以依照教師姓名、用途、平板編號或借用班級進行搜尋篩選。
                    </p>
                  </div>
                  <div className="flex flex-wrap items-center gap-2.5">
                    {isAdmin ? (
                      <button
                        onClick={handleCsvExport}
                        className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-xs font-bold inline-flex items-center gap-1.5 transition shadow-sm"
                      >
                        <i data-lucide="download" className="w-4 h-4"></i>
                        匯出篩選結果 (管理員限用)
                      </button>
                    ) : (
                      <div className="text-slate-400 text-xs flex items-center gap-1 px-3 py-1.5 bg-slate-100 rounded-lg">
                        <i data-lucide="info" className="w-3.5 h-3.5"></i>
                        <span>資料匯出僅供管理員登入操作</span>
                      </div>
                    )}
                  </div>
                </div>
                <div className="p-4 bg-slate-100/40 border-b border-slate-200 grid grid-cols-1 md:grid-cols-3 gap-3">
                  <div className="relative">
                    <span className="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400">
                      <i data-lucide="search" className="w-4 h-4"></i>
                    </span>
                    <input
                      type="text"
                      placeholder="搜尋教師、班級、平板、日期..."
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                      className="w-full pl-9 pr-4 py-2 text-xs rounded-xl border border-slate-200 focus:outline-none focus:ring-1 focus:ring-indigo-500 bg-white"
                    />
                  </div>
                  <div className="flex items-center gap-2">
                    <label className="text-xs text-slate-500 font-bold whitespace-nowrap">用途篩選:</label>
                    <select
                      value={filterPurpose}
                      onChange={(e) => setFilterPurpose(e.target.value)}
                      className="w-full px-3 py-2 text-xs rounded-xl border border-slate-200 focus:outline-none focus:ring-1 focus:ring-indigo-500 bg-white"
                    >
                      <option value="全部">顯示全部</option>
                      {PURPOSES.map((p, idx) => (
                        <option key={idx} value={p}>{p}</option>
                      ))}
                    </select>
                  </div>
                  <div className="flex items-center justify-end text-xs text-slate-500 font-semibold px-2">
                    <span>已篩選出：{filteredReservations.length} 筆借用預約</span>
                  </div>
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full border-collapse text-left">
                    <thead>
                      <tr className="bg-slate-50 border-b border-slate-200 text-slate-600 text-xs font-bold">
                        <th className="p-4">用途</th>
                        <th className="p-4">借用日期</th>
                        <th className="p-4">使用節次</th>
                        <th className="p-4">使用年級/班級</th>
                        <th className="p-4">借用教師</th>
                        <th className="p-4">分配平板編號</th>
                        <th className="p-4 text-center">管理動作</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-200 text-sm">
                      {filteredReservations.length > 0 ? (
                        filteredReservations.map((res, idx) => {
                          let purposeBadge = "bg-indigo-50 text-indigo-700 border-indigo-200";
                          if (res.purpose === "研習") purposeBadge = "bg-amber-50 text-amber-700 border-amber-200";
                          if (res.purpose === "行政業務") purposeBadge = "bg-slate-50 text-slate-700 border-slate-200";
                          if (res.purpose === "社團") purposeBadge = "bg-emerald-50 text-emerald-700 border-emerald-200";
                          if (res.purpose === "其他") purposeBadge = "bg-purple-50 text-purple-700 border-purple-200";
                          return (
                            <tr key={idx} className="hover:bg-slate-50/50 transition">
                              <td className="p-4">
                                <span className={`px-2.5 py-1 rounded-full text-xs font-semibold border ${purposeBadge}`}>
                                  {res.purpose}
                                </span>
                              </td>
                              <td className="p-4 font-mono font-medium text-slate-700">
                                {res.date.replace(/-/g, "/")}
                              </td>
                              <td className="p-4">
                                <div className="flex flex-wrap gap-1">
                                  {res.sessions.map((sess, sIdx) => (
                                    <span key={sIdx} className="bg-slate-100 text-slate-700 border border-slate-200 text-[10px] px-2 py-0.5 rounded">
                                      {sess}
                                    </span>
                                  ))}
                                </div>
                              </td>
                              <td className="p-4 font-semibold text-slate-800">
                                {res.grade}
                              </td>
                              <td className="p-4">
                                <div className="flex flex-col">
                                  <span className="font-bold text-slate-800">{res.teacher} 老師</span>
                                  <span className="text-[10px] text-slate-400 font-mono">{res.email}</span>
                                </div>
                              </td>
                              <td className="p-4 font-semibold">
                                <div className="flex items-center gap-1.5">
                                  {res.tabletCode ? (
                                    <span className="bg-slate-100 text-slate-800 text-xs px-2 py-1 rounded font-mono font-bold border border-slate-200">
                                      {res.tabletCode}
                                    </span>
                                  ) : (
                                    <span className="bg-red-50 text-red-600 text-xs px-2 py-1 rounded font-bold border border-red-100">
                                      未分配
                                    </span>
                                  )}
                                  <button 
                                    onClick={() => openTabletAssign(res)}
                                    className={`p-1 rounded transition ${isAdmin ? "text-indigo-600 hover:bg-indigo-50" : "text-slate-300 hover:text-indigo-600"}`}
                                    title={isAdmin ? "指派平板編號" : "登入管理員以設定平板編號"}
                                  >
                                    <i data-lucide={isAdmin ? "settings" : "lock"} className="w-3.5 h-3.5"></i>
                                  </button>
                                </div>
                              </td>
                              <td className="p-4 text-center">
                                <button
                                  onClick={() => requestDelete(res)}
                                  className={`p-2 rounded-lg transition inline-flex items-center gap-1 text-xs font-semibold ${
                                    isAdmin 
                                      ? "text-red-500 hover:text-red-700 hover:bg-red-50" 
                                      : "text-slate-400 hover:text-red-600 hover:bg-slate-100"
                                  }`}
                                  title={isAdmin ? "取消平板借用" : "登入管理員以取消預約"}
                                >
                                  <i data-lucide={isAdmin ? "trash-2" : "lock"} className="w-4 h-4"></i>
                                  {isAdmin ? "取消預約" : "需管理者"}
                                </button>
                              </td>
                            </tr>
                          );
                        })
                      ) : (
                        <tr>
                          <td colSpan="7" className="p-12 text-center text-slate-400">
                            <div className="flex flex-col items-center justify-center gap-2">
                              <i data-lucide="folder-open" className="w-8 h-8 opacity-60 text-slate-300"></i>
                              <p className="text-sm font-medium">沒有找到符合您搜尋條件的借用預約紀錄。</p>
                            </div>
                          </td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
                <div className="bg-slate-50 border-t border-slate-200 p-4 text-right text-xs text-slate-400 font-medium">
                  管理權限鎖定：修改及匯出資料需經管理員驗證。
                </div>
              </div>
            )}

            {/* TAB 3: WEEK TIMETABLE */}
            {activeTab === "timetable" && (
              <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden animate-fadeIn">
                <div className="p-4 md:p-6 bg-slate-50 border-b border-slate-200 flex flex-col md:flex-row md:items-center justify-between gap-4">
                  <div>
                    <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                      <span className="w-2.5 h-2.5 rounded-full bg-indigo-500"></span>
                      平板使用狀況週課表 (星期一 至 星期六)
                    </h2>
                    <p className="text-slate-500 text-xs mt-0.5">
                      💡 提示：點擊週課表中任何【可借用】空白欄位即可直接帶入預約。本課表依照每日各節次列出對應預約狀況。
                    </p>
                  </div>
                  <div className="flex flex-wrap items-center gap-3">
                    <button
                      onClick={() => changeWeek(-1)}
                      className="bg-white hover:bg-slate-100 text-slate-700 px-3 py-1.5 rounded-lg border border-slate-200 text-xs font-semibold inline-flex items-center gap-1 transition"
                    >
                      <i data-lucide="chevron-left" className="w-3.5 h-3.5"></i> 上一週
                    </button>
                    <button
                      onClick={goToTodayWeek}
                      className="bg-white hover:bg-slate-100 text-slate-700 px-3 py-1.5 rounded-lg border border-slate-200 text-xs font-semibold transition"
                    >
                      回到今日
                    </button>
                    <button
                      onClick={() => changeWeek(1)}
                      className="bg-white hover:bg-slate-100 text-slate-700 px-3 py-1.5 rounded-lg border border-slate-200 text-xs font-semibold inline-flex items-center gap-1 transition"
                    >
                      下一週 <i data-lucide="chevron-right" className="w-3.5 h-3.5"></i>
                    </button>
                    
                    <span className="text-slate-400 mx-1">|</span>
                    
                    <div className="flex items-center gap-2">
                      <label className="text-xs text-slate-500 font-medium">快速跳週:</label>
                      <input
                        type="date"
                        onChange={handleWeekJump}
                        className="bg-white border border-slate-200 rounded-lg px-2 py-1 text-xs text-slate-700 focus:outline-none focus:ring-1 focus:ring-indigo-500"
                      />
                    </div>
                  </div>
                </div>
                <div className="px-4 py-3 bg-indigo-50/50 border-b border-slate-150 flex flex-col md:flex-row md:items-center justify-between gap-3 text-xs font-semibold text-indigo-900">
                  <div className="flex items-center gap-1.5">
                    <i data-lucide="clock" className="w-4 h-4 text-indigo-600"></i>
                    <span>目前查看週別：{formatDate(selectedWeekStart).replace(/-/g, "/")} (一) 至 {currentWeekDays[5].dateStr.replace(/-/g, "/")} (六)</span>
                  </div>
                  
                  {isAdmin ? (
                    <button
                      onClick={handleWordExportClick}
                      className="bg-white hover:bg-blue-50 text-blue-700 border border-blue-300 px-3 py-1 rounded-lg text-xs font-bold inline-flex items-center gap-1 transition shadow-sm"
                    >
                      <i data-lucide="file-text" className="w-3.5 h-3.5"></i>
                      匯出課表為 Word / Google Doc
                    </button>
                  ) : (
                    <span className="text-slate-400 text-[11px]">課表Word匯出需管理者登入</span>
                  )}
                </div>
                
                <div className="overflow-x-auto p-4 bg-slate-50/50">
                  <div 
                    className="grid bg-slate-200 gap-[1px] border border-slate-200 rounded-xl overflow-hidden min-w-[950px]"
                    style={{
                      gridTemplateColumns: '130px repeat(6, minmax(130px, 1fr))',
                      display: 'grid'
                    }}
                  >
                    <div 
                      style={{ gridColumn: 1, gridRow: 1 }} 
                      className="p-3 bg-slate-100 flex items-center justify-center font-bold text-xs text-slate-500 border-b border-slate-200 select-none"
                    >
                      節次 / 時間
                    </div>
                    {currentWeekDays.map((day, dIdx) => (
                      <div 
                        key={`day-header-${dIdx}`}
                        style={{ gridColumn: dIdx + 2, gridRow: 1 }} 
                        className={`p-3 text-center bg-slate-100 text-slate-700 font-bold border-b border-slate-200 select-none ${
                          day.isToday ? "bg-amber-100/70 text-indigo-900" : ""
                        }`}
                      >
                        <div className="flex flex-col items-center">
                          <span className="text-xs font-semibold opacity-70">週{day.dayZh}</span>
                          <span className="text-sm font-extrabold mt-0.5">{day.monthDayStr}</span>
                          {day.isToday && (
                            <span className="mt-1 px-1.5 py-0.2 bg-amber-200 text-amber-900 rounded-md text-[9px] scale-90">今日</span>
                          )}
                        </div>
                      </div>
                    ))}
                    {SESSIONS.map((session, sIdx) => (
                      <div 
                        key={`sess-header-${sIdx}`}
                        style={{ gridColumn: 1, gridRow: sIdx + 2 }} 
                        className={`p-3 flex flex-col justify-center border-r border-slate-200 select-none ${session.bg} ${session.border}`}
                      >
                        <span className={`text-xs font-bold flex items-center gap-1.5 ${session.text}`}>
                          {!session.reservable && <i data-lucide="lock" className="w-3 h-3"></i>}
                          {session.name}
                        </span>
                        <span className="text-[10px] text-slate-400 mt-0.5">{session.time}</span>
                      </div>
                    ))}
                    {currentWeekDays.map((day, dIdx) => 
                      SESSIONS.map((session, sIdx) => {
                        const cellReservations = reservations.filter(res => 
                          res.date === day.dateStr && res.sessions.includes(session.name)
                        );
                        const hasReservations = cellReservations.length > 0;
                        return (
                          <div
                            key={`cell-${dIdx}-${sIdx}`}
                            style={{ 
                              gridColumn: dIdx + 2, 
                              gridRow: sIdx + 2 
                            }}
                            className={`p-2 bg-white min-h-[105px] flex flex-col justify-between border-b border-r border-slate-200/60 ${
                              !session.reservable && !hasReservations ? 'locked-stripes' : ''
                            }`}
                          >
                            {hasReservations ? (
                              <div className="space-y-1.5 w-full h-full flex flex-col justify-between">
                                {cellReservations.map((res) => {
                                  let cardColor = "bg-indigo-50 border-indigo-200 text-indigo-900 hover:bg-indigo-100/80";
                                  if (res.purpose === "研習") cardColor = "bg-amber-50 border-amber-200 text-amber-900 hover:bg-amber-100/80";
                                  if (res.purpose === "行政業務") cardColor = "bg-slate-50 border-slate-300 text-slate-900 hover:bg-slate-100/80";
                                  if (res.purpose === "社團") cardColor = "bg-emerald-50 border-emerald-200 text-emerald-900 hover:bg-emerald-100/80";
                                  if (res.purpose === "其他") cardColor = "bg-purple-50 border-purple-200 text-purple-900 hover:bg-purple-100/80";
                                  return (
                                    <div 
                                      key={res.id}
                                      className={`p-2 rounded-xl border text-[11px] leading-tight font-medium shadow-sm transition flex flex-col justify-between h-full ${cardColor}`}
                                      title={`借用人：${res.teacher} 老師\n信箱：${res.email}\n用途：${res.purpose}\n班級：${res.grade}`}
                                    >
                                      <div className="space-y-1">
                                        <div className="font-extrabold border-b border-current/10 pb-0.5 mb-0.5 truncate flex items-center gap-1 text-[11.5px]">
                                          <span>🏫</span>
                                          <span className="truncate">{res.grade}</span>
                                        </div>
                                        <div className="font-bold flex items-center justify-between gap-1">
                                          <span className="truncate">👤 {res.teacher} 老師</span>
                                        </div>
                                      </div>
                                      <div className="mt-2 pt-1 border-t border-dashed border-current/15 flex items-center justify-between gap-1">
                                        {res.tabletCode ? (
                                          <span className="bg-white/85 px-1.5 py-0.5 rounded text-[9px] text-slate-700 font-bold border border-slate-200/50 font-mono truncate max-w-[85px]">
                                            🏷️ {res.tabletCode}
                                          </span>
                                        ) : (
                                          <span className="bg-red-100 text-red-700 px-1 py-0.5 rounded text-[9px] font-bold border border-red-200">
                                            ⚠️ 未指派
                                          </span>
                                        )}
                                        <button
                                          onClick={() => openTabletAssign(res)}
                                          className={`p-1 rounded-lg transition ml-auto flex-shrink-0 ${isAdmin ? "bg-indigo-600 hover:bg-indigo-700 text-white" : "bg-slate-200 hover:bg-slate-300 text-slate-500"}`}
                                          title={isAdmin ? "管理端：指派平板編號" : "登入管理員以設定平板"}
                                        >
                                          <i data-lucide={isAdmin ? "edit-3" : "lock"} className="w-2.5 h-2.5"></i>
                                        </button>
                                      </div>
                                    </div>
                                  );
                                })}
                              </div>
                            ) : session.reservable ? (
                              <button
                                onClick={() => handleQuickBook(day.dateStr, session.name)}
                                className="w-full h-full min-h-[60px] rounded-lg border border-dashed border-slate-200 hover:border-indigo-400 hover:bg-indigo-50/40 hover:text-indigo-600 transition flex items-center justify-center text-slate-300 group relative"
                                title="點此快速預約該時段"
                              >
                                <i data-lucide="plus" className="w-4 h-4 opacity-0 group-hover:opacity-100 transition duration-150"></i>
                                <span className="text-[10px] font-medium opacity-100 group-hover:opacity-0 transition duration-150 absolute">可借用</span>
                              </button>
                            ) : (
                              <div className="w-full h-full min-h-[60px] rounded-lg flex flex-col items-center justify-center text-slate-400 select-none">
                                <i data-lucide="lock" className="w-3.5 h-3.5 opacity-40"></i>
                                <span className="text-[9px] mt-0.5 font-bold tracking-tight text-slate-400">不開放</span>
                              </div>
                            )}
                          </div>
                        );
                      })
                    )}
                  </div>
                </div>
                <div className="bg-slate-50 border-t border-slate-200 p-4 flex flex-wrap gap-4 justify-center text-xs">
                  <span className="font-semibold text-slate-500">時段底色圖例:</span>
                  <div className="flex items-center gap-1.5"><span className="w-3.5 h-3.5 bg-purple-100 rounded border border-purple-200"></span><span>早自習(不開放)</span></div>
                  <div className="flex items-center gap-1.5"><span className="w-3.5 h-3.5 bg-blue-100 rounded border border-blue-200"></span><span>1~4節</span></div>
                  <div className="flex items-center gap-1.5"><span className="w-3.5 h-3.5 bg-amber-100 rounded border border-amber-200"></span><span>中午</span></div>
                  <div className="flex items-center gap-1.5"><span className="w-3.5 h-3.5 bg-rose-100 rounded border border-rose-200"></span><span>5~7節</span></div>
                  <div className="flex items-center gap-1.5"><span className="w-3.5 h-3.5 bg-emerald-100 rounded border border-emerald-200"></span><span>第8節</span></div>
                </div>
              </div>
            )}
          </main>

          {/* ADMIN LOGIN MODAL */}
          {showLoginModal && (
            <div className="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm animate-fadeIn">
              <div className="bg-white rounded-2xl border border-slate-100 shadow-2xl max-w-sm w-full overflow-hidden transform transition-all">
                <div className="p-6 border-b border-slate-155 bg-slate-50 flex items-center justify-between">
                  <h3 className="text-base font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="shield-check" className="text-indigo-600 w-5 h-5"></i>
                    管理員安全登入
                  </h3>
                  <button 
                    onClick={() => setShowLoginModal(false)} 
                    className="text-slate-400 hover:text-slate-600 transition"
                  >
                    <i data-lucide="x" className="w-5 h-5"></i>
                  </button>
                </div>
                <form onSubmit={handleLoginSubmit}>
                  <div className="p-6 space-y-4">
                    {loginError && (
                      <div className="p-3 bg-red-50 text-red-700 text-xs font-semibold rounded-lg border border-red-200">
                        {loginError}
                      </div>
                    )}
                    <div className="space-y-1">
                      <label className="text-xs font-bold text-slate-700 block">帳號</label>
                      <input 
                        type="text"
                        required
                        placeholder="請輸入管理帳號"
                        value={loginUser}
                        onChange={(e) => setLoginUser(e.target.value)}
                        className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                      />
                    </div>
                    <div className="space-y-1">
                      <label className="text-xs font-bold text-slate-700 block">密碼</label>
                      <input 
                        type="password"
                        required
                        placeholder="請輸入密碼"
                        value={loginPass}
                        onChange={(e) => setLoginPass(e.target.value)}
                        className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                      />
                    </div>
                  </div>
                  <div className="p-4 bg-slate-50 border-t border-slate-150 flex items-center justify-end gap-2">
                    <button
                      type="button"
                      onClick={() => setShowLoginModal(false)}
                      className="px-4 py-2 rounded-xl text-xs font-semibold text-slate-600 hover:bg-slate-100 transition"
                    >
                      取消
                    </button>
                    <button
                      type="submit"
                      className="px-5 py-2 rounded-xl text-xs font-semibold bg-indigo-600 hover:bg-indigo-700 text-white shadow-md transition"
                    >
                      確認登入
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* SYSTEM SETTINGS MODAL */}
          {isEditingSettings && isAdmin && (
            <div className="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
              <div className="bg-white rounded-2xl border border-slate-100 shadow-2xl max-w-md w-full overflow-hidden transform transition-all">
                <div className="p-6 border-b border-slate-150 bg-slate-50/80 flex items-center justify-between">
                  <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="settings" className="text-indigo-600 w-5 h-5"></i>
                    系統借用參數設定
                  </h3>
                  <button 
                    onClick={() => setIsEditingSettings(false)} 
                    className="text-slate-400 hover:text-slate-600 transition"
                  >
                    <i data-lucide="x" className="w-5 h-5"></i>
                  </button>
                </div>
                <form onSubmit={saveSystemSettings} className="p-6 space-y-4">
                  <div className="p-3 bg-indigo-50 text-indigo-800 text-xs rounded-xl font-medium">
                    ✏️ 在此設定該學期開放借用預約起迄日期。超出此區間的日期，教師端將無法於表單中選取及送出預約。
                  </div>
                  <div className="space-y-1.5">
                    <label className="block text-xs font-bold text-slate-700">開放借用起日</label>
                    <input 
                      type="date"
                      required
                      value={tempSemesterStart}
                      onChange={(e) => setTempSemesterStart(e.target.value)}
                      className="w-full px-3 py-2 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 font-mono"
                    />
                  </div>
                  <div className="space-y-1.5">
                    <label className="block text-xs font-bold text-slate-700">開放借用迄日</label>
                    <input 
                      type="date"
                      required
                      value={tempSemesterEnd}
                      onChange={(e) => setTempSemesterEnd(e.target.value)}
                      className="w-full px-3 py-2 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 font-mono"
                    />
                  </div>
                  <div className="p-4 bg-slate-50 border-t border-slate-100 -mx-6 -mb-6 flex items-center justify-end gap-2">
                    <button
                      type="button"
                      onClick={() => setIsEditingSettings(false)}
                      className="px-4 py-2 rounded-xl text-xs font-semibold text-slate-600 hover:bg-slate-100 transition"
                    >
                      取消
                    </button>
                    <button
                      type="submit"
                      className="px-5 py-2 rounded-xl text-xs font-semibold bg-indigo-600 hover:bg-indigo-700 text-white shadow-md transition"
                    >
                      儲存系統設定
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* EXPORT OPTIONS MODAL */}
          {showExportModal && isAdmin && (
            <div className="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
              <div className="bg-white rounded-2xl border border-slate-100 shadow-2xl max-w-sm w-full overflow-hidden transform transition-all">
                <div className="p-5 border-b border-slate-150 bg-slate-50 flex items-center justify-between">
                  <h3 className="text-base font-bold text-slate-800 flex items-center gap-1.5">
                    <i data-lucide="download" className="text-indigo-600 w-4 h-4"></i>
                    選擇要匯出的資料範圍 (CSV)
                  </h3>
