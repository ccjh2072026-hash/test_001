                  <button onClick={() => setShowExportModal(false)} className="text-slate-400 hover:text-slate-600">
                    <i data-lucide="x" className="w-5 h-5"></i>
                  </button>
                </div>
                <div className="p-6 space-y-4">
                  <div className="space-y-2">
                    <label className="flex items-center gap-2 cursor-pointer">
                      <input 
                        type="radio" 
                        name="exportRange" 
                        checked={exportRangeType === "all"} 
                        onChange={() => setExportRangeType("all")} 
                      />
                      <span className="text-sm font-semibold text-slate-700">匯出全部歷史預約紀錄</span>
                    </label>
                    <label className="flex items-center gap-2 cursor-pointer">
                      <input 
                        type="radio" 
                        name="exportRange" 
                        checked={exportRangeType === "custom"} 
                        onChange={() => setExportRangeType("custom")} 
                      />
                      <span className="text-sm font-semibold text-slate-700">自訂日期區間匯出</span>
                    </label>
                  </div>
                  {exportRangeType === "custom" && (
                    <div className="grid grid-cols-2 gap-2 p-3 bg-slate-50 rounded-xl border border-slate-200">
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-1">開始日期</label>
                        <input 
                          type="date" 
                          value={customExportStart} 
                          onChange={(e) => setCustomExportStart(e.target.value)} 
                          className="w-full text-xs px-2 py-1.5 border rounded-lg"
                        />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-1">結束日期</label>
                        <input 
                          type="date" 
                          value={customExportEnd} 
                          onChange={(e) => setCustomExportEnd(e.target.value)} 
                          className="w-full text-xs px-2 py-1.5 border rounded-lg"
                        />
                      </div>
                    </div>
                  )}
                </div>
                <div className="p-4 bg-slate-50 border-t border-slate-100 flex items-center justify-end gap-2">
                  <button
                    onClick={() => setShowExportModal(false)}
                    className="px-4 py-2 rounded-xl text-xs font-semibold text-slate-600 hover:bg-slate-100 transition"
                  >
                    取消
                  </button>
                  <button
                    onClick={executeCsvExport}
                    className="px-5 py-2 rounded-xl text-xs font-semibold bg-indigo-600 hover:bg-indigo-700 text-white shadow-md transition"
                  >
                    確認匯出 CSV
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* WORD EXPORT MODAL */}
          {showWordExportModal && isAdmin && (
            <div className="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
              <div className="bg-white rounded-2xl border border-slate-100 shadow-2xl max-w-sm w-full overflow-hidden transform transition-all">
                <div className="p-5 border-b border-slate-150 bg-slate-50 flex items-center justify-between">
                  <h3 className="text-base font-bold text-slate-800 flex items-center gap-1.5">
                    <i data-lucide="file-text" className="text-blue-600 w-4 h-4"></i>
                    匯出課表至 Word / Google文件
                  </h3>
                  <button onClick={() => setShowWordExportModal(false)} className="text-slate-400 hover:text-slate-600">
                    <i data-lucide="x" className="w-5 h-5"></i>
                  </button>
                </div>
                <div className="p-6 space-y-4">
                  <div className="p-3 bg-blue-50 text-blue-800 text-xs rounded-xl leading-relaxed">
                    📝 系統將產生 Microsoft Word / Google Docs 完美支援的 **.doc 表格檔**。若匯出跨多週，系統會自動在週與週之間插入**分頁符號**，排版極致整齊。
                  </div>
                  <div className="space-y-2">
                    <label className="flex items-center gap-2 cursor-pointer">
                      <input 
                        type="radio" 
                        name="wordExport" 
                        checked={wordExportType === "week"} 
                        onChange={() => setWordExportType("week")} 
                      />
                      <span className="text-sm font-semibold text-slate-700">僅匯出當前畫面「本週課表」</span>
                    </label>
                    <label className="flex items-center gap-2 cursor-pointer">
                      <input 
                        type="radio" 
                        name="wordExport" 
                        checked={wordExportType === "range"} 
                        onChange={() => setWordExportType("range")} 
                      />
                      <span className="text-sm font-semibold text-slate-700">自訂日期範圍 (批次產製週表格)</span>
                    </label>
                  </div>
                  {wordExportType === "range" && (
                    <div className="grid grid-cols-2 gap-2 p-3 bg-slate-50 rounded-xl border border-slate-200">
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-1">開始日期</label>
                        <input 
                          type="date" 
                          value={wordCustomStart} 
                          onChange={(e) => setWordCustomStart(e.target.value)} 
                          className="w-full text-xs px-2 py-1.5 border rounded-lg"
                        />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-1">結束日期</label>
                        <input 
                          type="date" 
                          value={wordCustomEnd} 
                          onChange={(e) => setWordCustomEnd(e.target.value)} 
                          className="w-full text-xs px-2 py-1.5 border rounded-lg"
                        />
                      </div>
                    </div>
                  )}
                </div>
                <div className="p-4 bg-slate-50 border-t border-slate-100 flex items-center justify-end gap-2">
                  <button
                    onClick={() => setShowWordExportModal(false)}
                    className="px-4 py-2 rounded-xl text-xs font-semibold text-slate-600 hover:bg-slate-100 transition"
                  >
                    取消
                  </button>
                  <button
                    onClick={executeWordExport}
                    className="px-5 py-2 rounded-xl text-xs font-semibold bg-indigo-600 hover:bg-indigo-700 text-white shadow-md transition"
                  >
                    確認產製 Doc 檔
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* TABLET ASSIGNMENT MODAL */}
          {tabletAssignModal && isAdmin && (
            <div className="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fadeIn">
              <div className="bg-white rounded-2xl border border-slate-100 shadow-2xl max-w-lg w-full overflow-hidden transform transition-all">
                <div className="p-6 border-b border-slate-150 bg-slate-50/80 flex items-center justify-between">
                  <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="tablet" className="text-indigo-600 w-5 h-5"></i>
                    指派/設定平板編號
                  </h3>
                  <button 
                    onClick={() => setTabletAssignModal(null)} 
                    className="text-slate-400 hover:text-slate-600 transition"
                  >
                    <i data-lucide="x" className="w-5 h-5"></i>
                  </button>
                </div>
                <div className="p-6 space-y-5">
                  <div className="p-3.5 bg-slate-50 rounded-xl space-y-1 text-xs text-slate-600 border border-slate-100">
                    <p>🧑‍🏫 借用教師：<strong className="text-slate-800">{tabletAssignModal.teacher} 老師</strong></p>
                    <p>📅 借用日期：<strong className="text-slate-800">{tabletAssignModal.date}</strong></p>
                    <p>🏫 預約班級：<strong className="text-slate-800">{tabletAssignModal.grade}</strong></p>
                    <p>⏰ 借用節次：<strong className="text-slate-800">{tabletAssignModal.sessions.join(", ")}</strong></p>
                  </div>
                  <div className="space-y-1.5">
                    <label className="block text-sm font-bold text-slate-700">分配平板組別代碼或編號</label>
                    <input 
                      type="text"
                      value={tempTabletCode}
                      onChange={(e) => setTempTabletCode(e.target.value)}
                      placeholder="例如: (S)-A(1-30)、(I)-B(1-30) 或手動修改"
                      className="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-mono font-bold"
                    />
                  </div>
                  
                  <div className="space-y-4">
                    <p className="text-xs font-bold text-indigo-950 uppercase tracking-wider flex items-center gap-1">
                      <span className="w-1.5 h-3 rounded-full bg-indigo-600"></span>
                      管理者智慧快選代碼群：
                    </p>
                    {/* Samsung Group Grid */}
                    <div className="space-y-1.5 p-3.5 bg-slate-50/50 rounded-xl border border-slate-200/60">
                      <p className="text-xs font-bold text-slate-500 flex items-center gap-1">
                        📱 三星平板系列 <span className="font-mono text-[10px] bg-indigo-100 text-indigo-800 px-1.5 py-0.2 rounded font-semibold">(S) A~P (1-30)</span>
                      </p>
                      <div className="grid grid-cols-4 sm:grid-cols-4 gap-1.5 pt-1.5">
                        {SAMSUNG_CODES.map((code, idx) => (
                          <button
                            key={idx}
                            type="button"
                            onClick={() => setTempTabletCode(code)}
                            className={`text-[11px] py-1 px-1 text-center rounded border font-mono font-bold transition ${
                              tempTabletCode === code 
                                ? "bg-indigo-600 border-indigo-600 text-white shadow-sm"
                                : "bg-white border-slate-200 hover:bg-slate-100 text-slate-700"
                            }`}
                          >
                            {code.replace("(S)-", "")}
                          </button>
                        ))}
                      </div>
                    </div>
                    {/* iPad & Chromebook Groups */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                      <div className="p-3 bg-slate-50/50 rounded-xl border border-slate-200/60 space-y-2">
                        <p className="text-xs font-bold text-slate-500">
                          🍎 iPad 系列 <span className="font-mono text-[10px] bg-rose-100 text-rose-800 px-1.5 py-0.2 rounded font-semibold">(I) B~H (1-30)</span>
                        </p>
                        <div className="grid grid-cols-4 gap-1.5 pt-1.5">
                          {IPAD_CODES.map((code, idx) => (
                            <button
                              key={idx}
                              type="button"
                              onClick={() => setTempTabletCode(code)}
                              className={`text-[10px] py-1 px-1 text-center rounded border font-mono font-bold transition ${
                                tempTabletCode === code 
                                  ? "bg-rose-600 border-rose-600 text-white shadow-sm"
                                  : "bg-white border-slate-200 hover:bg-slate-100 text-slate-700"
                              }`}
                            >
                              {code.replace("(I)-", "I ")}
                            </button>
                          ))}
                        </div>
                      </div>
                      <div className="p-3 bg-slate-50/50 rounded-xl border border-slate-200/60 space-y-2">
                        <p className="text-xs font-bold text-slate-500">
                          💻 Chromebook 系列 <span className="font-mono text-[10px] bg-emerald-100 text-emerald-800 px-1.5 py-0.2 rounded font-semibold">(CB) A~B (1-30)</span>
                        </p>
                        <div className="flex gap-1.5">
                          {CHROMEBOOK_CODES.map((code, idx) => (
                            <button
                              key={idx}
                              type="button"
                              onClick={() => setTempTabletCode(code)}
                              className={`text-[11px] py-1.5 px-3 rounded border font-mono font-bold w-full transition ${
                                tempTabletCode === code 
                                  ? "bg-emerald-600 border-emerald-600 text-white shadow-sm"
                                  : "bg-white border-slate-200 hover:bg-slate-100 text-slate-700"
                              }`}
                            >
                              {code.replace("(CB)-", "CB ")}
                            </button>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
                <div className="p-4 bg-slate-50 border-t border-slate-100 flex items-center justify-end gap-2">
                  <button
                    onClick={() => setTabletAssignModal(null)}
                    className="px-4 py-2 rounded-xl text-xs font-semibold text-slate-600 hover:bg-slate-100 transition"
                  >
                    取消
                  </button>
                  <button
                    onClick={saveTabletAssign}
                    className="px-5 py-2 rounded-xl text-xs font-semibold bg-indigo-600 hover:bg-indigo-700 text-white shadow-md transition"
                  >
                    儲存設定
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* DELETION CONFIRMATION MODAL */}
          {deleteConfirmModal && isAdmin && (
            <div className="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
              <div className="bg-white rounded-2xl border border-slate-100 shadow-2xl max-w-sm w-full overflow-hidden transform transition-all p-6 space-y-4">
                <div className="flex items-center gap-3 text-red-600">
                  <div className="p-2 bg-red-50 rounded-lg">
                    <i data-lucide="trash-2" className="w-6 h-6"></i>
                  </div>
                  <div>
                    <h3 className="text-base font-bold text-slate-900">確認取消此平板借用預約？</h3>
                    <p className="text-xs text-slate-500">此動作將無法復原。</p>
                  </div>
                </div>
                <div className="p-3 bg-slate-50 rounded-xl space-y-1 text-xs text-slate-600 font-medium">
                  <p>🧑‍🏫 預約老師：<strong>{deleteConfirmModal.teacher} 老師</strong></p>
                  <p>📅 預約日期：<strong>{deleteConfirmModal.date}</strong></p>
                  <p>🏫 預約班級：<strong>{deleteConfirmModal.grade}</strong></p>
                  <p>⏰ 預約節次：<strong>{deleteConfirmModal.sessions.join(", ")}</strong></p>
                </div>
                <div className="flex items-center justify-end gap-2 pt-2">
                  <button
                    onClick={() => setDeleteConfirmModal(null)}
                    className="px-4 py-2 rounded-xl text-xs font-semibold text-slate-600 hover:bg-slate-100 transition"
                  >
                    暫不取消
                  </button>
                  <button
                    onClick={confirmDelete}
                    className="px-5 py-2 rounded-xl text-xs font-semibold bg-red-600 hover:bg-red-700 text-white shadow-md transition"
                  >
                    確認取消預約
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <footer className="bg-slate-900 text-slate-400 border-t border-slate-800 py-8 px-4 mt-12 text-center text-xs space-y-2">
            <p className="font-bold text-slate-300">
              新北市立佳佳國民中學 平板臨時設備借用系統
            </p>
            <p>
              本網頁提供校內資訊教師、各領域授課教師預約登記使用。所有資料皆即時更新存檔。
            </p>
            <p className="text-[10px] text-slate-500">
              系統時間依據 2026/07/20 (一) 基準校時運作。
            </p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
